name: Validate

on:
  push:
    branches:
      - main
      - autofixing
  pull_request:

jobs:
  canonical-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate contract
        run: npm run validate:contract

      - name: Validate smoke
        run: npm run validate:smoke

      - name: Integration test
        run: python3 scripts/integration_test_scafforge.py

      - name: GPTTalker migration validation
        run: python3 scripts/validate_gpttalker_migration.py
